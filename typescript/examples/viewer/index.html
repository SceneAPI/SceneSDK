<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sfmapi point cloud viewer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #0b0d12;
        color: #e7eaf0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #app { display: flex; flex-direction: column; height: 100vh; }
      header {
        padding: 10px 14px;
        border-bottom: 1px solid #1d2230;
        background: linear-gradient(90deg, rgba(91,141,239,0.10), rgba(124,92,255,0.10));
        display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      }
      header label { font-size: 12px; opacity: 0.85; }
      header input, header button, header select {
        background: #131825; color: inherit;
        border: 1px solid #2a3145;
        padding: 6px 9px; border-radius: 6px;
        font: inherit;
      }
      header input { min-width: 320px; }
      header button {
        cursor: pointer; background: linear-gradient(95deg, #5b8def, #7c5cff);
        border: none; font-weight: 600;
      }
      header button:disabled { opacity: 0.4; cursor: not-allowed; }
      #canvas-host { flex: 1; position: relative; }
      #canvas-host canvas { display: block; }
      #status {
        position: absolute; bottom: 10px; left: 12px;
        font-size: 12px; padding: 6px 10px; border-radius: 6px;
        background: rgba(11,13,18,0.7); border: 1px solid #1d2230;
        max-width: 60%;
      }
      #legend {
        position: absolute; top: 10px; right: 12px;
        font-size: 11px; padding: 8px 10px; border-radius: 6px;
        background: rgba(11,13,18,0.7); border: 1px solid #1d2230;
        line-height: 1.5;
      }
      kbd { background: #2a3145; padding: 1px 5px; border-radius: 3px; font-family: ui-monospace, monospace; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <label>API base
          <input id="base" value="http://localhost:8080" />
        </label>
        <label>Reconstruction
          <input id="rid" placeholder="recon_id (26 chars)" />
        </label>
        <label>Snapshot
          <select id="seq"></select>
        </label>
        <label>API key
          <input id="key" type="password" placeholder="sfm_..." />
        </label>
        <button id="load">Load</button>
        <button id="preview">Preview</button>
      </header>
      <div id="canvas-host">
        <div id="status">Idle. Enter a reconstruction id and click Load.</div>
        <div id="legend">
          <strong>Controls</strong><br/>
          drag — orbit<br/>
          right-drag — pan<br/>
          wheel — zoom<br/>
          <kbd>R</kbd> — reset camera<br/>
          <kbd>F</kbd> — fit to cloud
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
