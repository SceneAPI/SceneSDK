name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Install
        run: |
          uv venv --seed
          uv pip install -e ".[dev]"
          uv pip install build
      - name: Ruff
        run: uv run ruff check tests
      - name: Test
        run: uv run pytest -q
      - name: Build package
        run: uv run python -m build --sdist --wheel

  python-generated:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Install
        run: |
          uv venv --seed
          uv pip install -e scenesdk
          uv pip install build
      - name: Import package
        run: uv run python -c "import scenesdk, scenesdk.models; print(scenesdk.__name__)"
      - name: Build package
        run: uv run python -m build scenesdk --sdist --wheel

  typescript:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: OpenAPI drift
        run: npm run check:openapi-drift
      - name: Codegen provenance
        run: npm run check:codegen-provenance
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S cpp -B cpp/build
      - name: Build
        run: cmake --build cpp/build --config Release
      - name: Test
        run: ctest --test-dir cpp/build -C Release --output-on-failure
