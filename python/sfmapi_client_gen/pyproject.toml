[project]
name = "sfmapi-client-gen"
version = "0.0.1"
description = "Auto-generated typed Python SDK for sfmapi. Generated from the live OpenAPI spec by openapi-python-client."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "attrs>=23.2",
    "httpx>=0.28",
    "python-dateutil>=2.9",
]
license = { text = "Apache-2.0" }
keywords = ["sfmapi", "structure-from-motion", "colmap", "sdk", "generated"]
authors = [{ name = "sfmapi authors" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
]

[project.urls]
Repository = "https://github.com/SFMAPI/sfmapi-sdk"
Documentation = "https://sfmapi.github.io/"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
exclude = ["__pycache__", "*.pyc", "*.pyo"]

[tool.hatch.build.targets.wheel]
packages = ["."]
only-include = ["api", "models", "client.py", "errors.py", "types.py", "__init__.py", "py.typed", "_ergonomics.py"]
