[project]
name = "scenesdk"
version = "0.1.0"
description = "Auto-generated typed Python SDK for sceneapi (import package scenesdk)."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
keywords = ["sceneapi", "sfm", "structure-from-motion", "colmap", "sdk"]
authors = [{ name = "sceneapi authors" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
]
dependencies = [
    "attrs>=23.2",
    "httpx>=0.28",
    "python-dateutil>=2.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
    "ruff>=0.8",
]

[project.urls]
Repository = "https://github.com/SFMAPI/sfmapi-sdk"
Documentation = "https://sfmapi.github.io/"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Dev-install build root for the same `scenesdk` distribution the
# self-contained root at scenesdk/pyproject.toml publishes:
# `pip install -e .` here yields the generated package plus the test
# extras. Release builds/publishes run from scenesdk/ only.
[tool.hatch.build.targets.wheel]
packages = ["scenesdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-ra"
